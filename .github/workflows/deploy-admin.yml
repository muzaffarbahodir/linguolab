name: Deploy Admin

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-admin.yml'
  workflow_dispatch:

concurrency:
  group: deploy-admin
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: artsoftmuzaffarkhon/linguolab-admin

jobs:
  deploy:
    name: Build, push image, deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Pull & restart on server
        run: |
          SHA="${{ github.sha }}"
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd /opt/linguolab/compose && \
             sed -i '/^ADMIN_TAG=/d' .env && echo \"ADMIN_TAG=${SHA}\" >> .env && \
             docker compose pull linguolab_admin && docker compose up -d linguolab_admin"

      - name: Verify container running
        run: |
          sleep 8
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'docker ps --filter "name=linguolab_admin" --format "table {{.Names}}\t{{.Status}}"'
