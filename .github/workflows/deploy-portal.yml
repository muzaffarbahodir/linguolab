name: Deploy Portal

on:
  push:
    branches: [main]
    paths:
      - 'apps/portal/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-portal.yml'
  workflow_dispatch:

concurrency:
  group: deploy-portal
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: artsoftmuzaffarkhon/linguolab-portal

jobs:
  deploy:
    name: Build, push image, deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/portal/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            NEXTAUTH_URL=https://portal-linguolab.muzaffarbahodir.uz
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Inject NEXTAUTH secrets into server .env
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "sed -i '/^NEXTAUTH_/d' /opt/linguolab/compose/.env
             cat >> /opt/linguolab/compose/.env <<'ENVEOF'
          NEXTAUTH_URL=https://portal-linguolab.muzaffarbahodir.uz
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          ENVEOF"

      - name: Pull & restart on server
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'cd /opt/linguolab/compose && docker compose pull linguolab_portal && docker compose up -d linguolab_portal'

      - name: Verify container running
        run: |
          sleep 10
          ssh -i ~/.ssh/id_ed25519 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'docker ps --filter "name=linguolab_portal" --format "table {{.Names}}\t{{.Status}}" && docker exec linguolab_portal wget -qO- http://localhost:3002/ | head -5 || true'
