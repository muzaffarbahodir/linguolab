name: E2E

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      API_URL: http://localhost:9999
      NEXTAUTH_URL: http://localhost:3002
      NEXTAUTH_SECRET: e2e-test-secret-minimum-32-chars-long!!!
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.0.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @linguolab/api prisma:generate

      - name: Build portal
        run: pnpm --filter @linguolab/portal build
        env:
          API_URL: http://localhost:9999
          NEXTAUTH_URL: http://localhost:3002
          NEXTAUTH_SECRET: e2e-test-secret-minimum-32-chars-long!!!

      - name: Install Playwright browsers
        run: pnpm --filter @linguolab/e2e install:browsers

      - name: Run E2E tests
        run: pnpm --filter @linguolab/e2e e2e
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
