server {
    listen 443 ssl;
    server_name api-linguolab.muzaffarbahodir.uz;

    ssl_certificate     /etc/nginx/certs/linguolab/origin.pem;
    ssl_certificate_key /etc/nginx/certs/linguolab/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 25M;

    # lazy DNS resolution — не падаем если linguolab_api ещё не поднят
    location / {
        set $upstream http://linguolab_api:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection "";
        proxy_read_timeout 60s;
    }

    # webhook-эндпоинты (Soliq/Payme/Click) — короткий таймаут чтобы провайдер не зависал
    location ~ ^/(payments|telegram)/.*/webhook$ {
        set $upstream http://linguolab_api:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
